 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bando Bodega — Project Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }
  .db { padding: 1.25rem; max-width: 1400px; margin: 0 auto; }

  .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid #222; flex-wrap: wrap; gap: 12px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo { width: 44px; height: 44px; background: #e05c00; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -1px; }
  .brand-name { font-size: 18px; font-weight: 600; color: #fff; }
  .brand-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .hdr-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge-green { background: #0d2e0d; color: #4caf50; border: 1px solid #1e5c1e; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; }
  .badge-orange { background: #2a1500; color: #e05c00; border: 1px solid #5a2e00; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; }
  .badge-red { background: #2a0d0d; color: #ff6b4a; border: 1px solid #5a1a1a; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 500; }
  .refresh-btn { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all .2s; }
  .refresh-btn:hover { background: #222; color: #ccc; border-color: #444; }
  .last-updated { font-size: 11px; color: #444; }

  /* Controls bar */
  .controls-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; }
  .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .06em; }
  .chip { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; border-radius: 20px; padding: 5px 13px; font-size: 12px; cursor: pointer; transition: all .15s; }
  .chip:hover { border-color: #444; color: #ccc; }
  .chip.active { background: #e05c00; color: #fff; border-color: #e05c00; font-weight: 600; }
  .chip.active.chip-blue { background: #3987e5; border-color: #3987e5; }
  .chip.active.chip-purple { background: #9085e9; border-color: #9085e9; }
  .chip.active.chip-gray { background: #555; border-color: #555; }
  .chip.active.chip-green { background: #4caf50; border-color: #4caf50; }
  .chip-clear { background: none; border: none; color: #666; font-size: 11px; cursor: pointer; text-decoration: underline; padding: 5px 4px; }
  .chip-clear:hover { color: #ccc; }
  .table-toggle-btn { background: #1a1a1a; color: #ccc; border: 1px solid #2a2a2a; border-radius: 8px; padding: 7px 16px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; }
  .table-toggle-btn:hover { border-color: #e05c00; color: #fff; }
  .table-toggle-btn.active { background: #e05c00; border-color: #e05c00; color: #fff; }

  .alert-banner { display: flex; align-items: center; gap: 10px; background: #200a00; border: 1px solid #5a2200; border-radius: 12px; padding: 12px 16px; margin-bottom: 1rem; font-size: 12px; color: #ff9166; cursor: pointer; transition: background .15s; }
  .alert-banner:hover { background: #2a0d00; }
  .alert-banner i { font-size: 16px; color: #ff6b4a; flex-shrink: 0; }

  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .kpi { background: #1a1a1a; border-radius: 12px; padding: 14px 16px; border: 1px solid #222; }
  .kpi-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .kpi-val { font-size: 28px; font-weight: 600; color: #fff; line-height: 1; }
  .kpi-sub { font-size: 11px; color: #444; margin-top: 4px; }
  .kpi-orange .kpi-val { color: #e05c00; }
  .kpi-yellow .kpi-val { color: #f5c518; }
  .kpi-green .kpi-val { color: #4caf50; }
  .kpi-blue .kpi-val { color: #4a9eff; }
  .kpi-red .kpi-val { color: #ff6b4a; }
  .kpi.clickable { cursor: pointer; transition: border-color .15s; }
  .kpi.clickable:hover { border-color: #444; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .grid3 { display: grid; grid-template-columns: minmax(0,1.5fr) minmax(0,.5fr); gap: 10px; margin-bottom: 10px; }
  .grid2b { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .card { background: #1a1a1a; border-radius: 12px; padding: 16px 18px; border: 1px solid #222; }
  .card-title { font-size: 10px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .card-title i { font-size: 14px; color: #e05c00; }
  .card-title-hint { margin-left: auto; text-transform: none; font-weight: 400; color: #333; }

  .phase-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-radius: 8px; padding: 4px 6px; margin-left: -6px; margin-right: -6px; transition: background .15s; }
  .phase-row.clickable { cursor: pointer; }
  .phase-row.clickable:hover { background: #212121; }
  .phase-row.clickable:hover .phase-name { color: #fff; }
  .phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .phase-name { font-size: 12px; color: #ccc; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s; }
  .phase-pct { font-size: 11px; font-weight: 600; color: #666; min-width: 36px; text-align: right; }
  .phase-chevron { font-size: 12px; color: #444; flex-shrink: 0; }
  .track { flex: 1; height: 5px; background: #252525; border-radius: 3px; overflow: hidden; }
  .fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

  .task-row { display: flex; align-items: flex-start; gap: 8px; padding: 9px 0; border-bottom: 1px solid #1e1e1e; }
  .task-row:last-child { border-bottom: none; }
  .task-row.clickable-task { cursor: pointer; border-radius: 6px; padding: 9px 6px; margin: 0 -6px; transition: background .15s; }
  .task-row.clickable-task:hover { background: #212121; }
  .task-row.clickable-task:hover .task-name { color: #fff; }
  .task-name { font-size: 12px; color: #ddd; flex: 1; line-height: 1.4; transition: color .15s; }
  .task-meta { font-size: 10px; color: #444; margin-top: 3px; }
  .pills { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  .pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .pill-red { background: #2a0d0d; color: #e05c00; border: 1px solid #4a1a1a; }
  .pill-yellow { background: #2a2000; color: #f5c518; border: 1px solid #5a4500; }
  .pill-blue { background: #0d1a2a; color: #4a9eff; border: 1px solid #1a3a5a; }
  .pill-purple { background: #1a0d2a; color: #a07aff; border: 1px solid #3a1a5a; }
  .pill-gray { background: #1e1e1e; color: #555; border: 1px solid #2a2a2a; }
  .pill-green { background: #0d2a0d; color: #4caf50; border: 1px solid #1a5a1a; }
  .pill-overdue { background: #3a0a00; color: #ff6b4a; border: 1px solid #6a1a00; }

  .tl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .tl-label { font-size: 11px; color: #555; min-width: 100px; flex-shrink: 0; }
  .tl-track { flex: 1; height: 8px; background: #222; border-radius: 4px; position: relative; }
  .tl-bar { height: 100%; border-radius: 4px; position: absolute; }
  .tl-months { display: flex; justify-content: space-between; padding-left: 110px; margin-top: 6px; }
  .tl-month { font-size: 10px; color: #333; }

  .dl-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e1e1e; gap: 8px; }
  .dl-row:last-child { border-bottom: none; }
  .dl-row.clickable-task { cursor: pointer; border-radius: 6px; padding: 8px 6px; margin: 0 -6px; transition: background .15s; }
  .dl-row.clickable-task:hover { background: #212121; }
  .dl-name { font-size: 12px; color: #ddd; flex: 1; }
  .dl-phase { font-size: 10px; color: #444; margin-top: 2px; }
  .dl-date { font-size: 11px; color: #555; min-width: 44px; text-align: right; flex-shrink: 0; }

  .action-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #1e1e1e; }
  .action-row:last-child { border-bottom: none; }
  .action-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; color: #fff; }
  .action-text { font-size: 12px; color: #ccc; line-height: 1.5; flex: 1; }

  .ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
  .ring-num { font-size: 32px; font-weight: 600; color: #e05c00; margin-top: 8px; }
  .ring-sub { font-size: 11px; color: #444; margin-top: 4px; text-align: center; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; cursor: pointer; padding: 3px 6px; border-radius: 6px; transition: background .15s; }
  .legend-item:hover { background: #212121; color: #ccc; }
  .legend-item.active-filter { color: #fff; background: #212121; font-weight: 600; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .loading { color: #555; font-size: 14px; padding: 3rem; text-align: center; }
  .error-msg { color: #e05c00; font-size: 12px; padding: 1rem; background: #1a0a00; border-radius: 8px; border: 1px solid #5a2e00; margin-bottom: 1rem; }

  .footer { text-align: center; font-size: 11px; color: #333; padding: 1.5rem 0 .5rem; border-top: 1px solid #1a1a1a; margin-top: 1rem; letter-spacing: .1em; text-transform: uppercase; }

  /* All-tasks table */
  .table-card { margin-bottom: 10px; }
  .table-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .table-search { flex: 1; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #ddd; outline: none; }
  .table-search:focus { border-color: #e05c00; }
  .table-search::placeholder { color: #444; }
  .table-count { font-size: 11px; color: #444; white-space: nowrap; align-self: center; padding: 0 4px; }
  .table-list { max-height: 480px; overflow-y: auto; }
  .table-phase-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; background: #1e1e1e; color: #888; border: 1px solid #2a2a2a; }
  .table-empty { font-size: 12px; color: #444; padding: 24px 0; text-align: center; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 14px; max-width: 560px; width: 100%; max-height: 82vh; overflow-y: auto; padding: 20px 22px; }
  .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 10px; }
  .modal-title-wrap { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .modal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .modal-title { font-size: 15px; font-weight: 600; color: #fff; }
  .modal-close { background: #1e1e1e; border: 1px solid #2a2a2a; color: #888; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 15px; flex-shrink: 0; line-height: 1; }
  .modal-close:hover { color: #fff; border-color: #444; }
  .modal-progress { font-size: 12px; color: #666; margin: 10px 0 8px; }
  .modal-track { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 18px; }
  .modal-empty { font-size: 12px; color: #444; padding: 20px 0; text-align: center; }
  .modal-field-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e1e1e; font-size: 12px; }
  .modal-field-row:last-child { border-bottom: none; }
  .modal-field-label { color: #555; }
  .modal-field-val { color: #ddd; text-align: right; }

  @media (max-width: 700px) {
    .grid2, .grid3, .grid2b { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .hdr { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

<div class="db" id="root">
  <div class="loading"><i class="ti ti-loader"></i> Loading Bando Bodega dashboard...</div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgYAZEQZzb3QPLXh8pP0eZYsOwHHwJsZz2l1qaB1mIj945McPNQQay9SD_OI_6PB4OogENRHWRS2Ce/pub?gid=2136691439&single=true&output=csv';

// How often to silently pull fresh data from the Google Sheet, in milliseconds.
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5 minutes

const PHASE_COLORS = {
  'Phase 0 — Ops Stabilization': '#e05c00',
  'Phase 1 — Quick Wins': '#3987e5',
  'Phase 2 — Product Drops': '#1baf7a',
  'Phase 3 — Bando Bodega Build': '#888780',
  'Ongoing — Full Engagement Duration': '#9085e9'
};
const PHASE_SHORT = {
  'Phase 0 — Ops Stabilization': 'Phase 0 — Ops',
  'Phase 1 — Quick Wins': 'Phase 1 — Quick wins',
  'Phase 2 — Product Drops': 'Phase 2 — Products',
  'Phase 3 — Bando Bodega Build': 'Phase 3 — Build',
  'Ongoing — Full Engagement Duration': 'Ongoing'
};
const PHASES_ORDER = ['Phase 0 — Ops Stabilization','Phase 1 — Quick Wins','Phase 2 — Product Drops','Phase 3 — Bando Bodega Build','Ongoing — Full Engagement Duration'];

/* ---------- State ---------- */
let RAW_TASKS = [];         // all parsed tasks, cleaned + annotated (id, overdue)
let ownerFilter = 'All';    // 'All' | 'Darius' | 'Terry'
let statusFilter = null;    // null | 'In Progress' | 'Not Started' | 'Ongoing' | 'Completed'
let showAllTable = false;
let tableSearch = '';
let statusChartInst = null;
let readyChartInst = null;

/* ---------- Helpers ---------- */
function pillClass(s) {
  if (!s) return 'pill-gray';
  const l = s.toLowerCase();
  if (l === 'in progress') return 'pill-blue';
  if (l === 'ongoing') return 'pill-purple';
  if (l === 'completed') return 'pill-green';
  return 'pill-gray';
}
function priPill(p) {
  if (!p) return '';
  const l = p.toLowerCase();
  if (l === 'high') return '<span class="pill pill-red">High</span>';
  if (l === 'medium') return '<span class="pill pill-yellow">Med</span>';
  return '<span class="pill pill-gray">Low</span>';
}
function daysToLaunch() {
  return Math.max(0, Math.ceil((new Date('2026-10-03') - new Date()) / 86400000));
}
function nowStr() {
  return new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function esc(str) {
  return (str || '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function parseTaskDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + ' 2026');
  return isNaN(d) ? null : d;
}
function ownerMatches(taskOwner, filter) {
  if (filter === 'All') return true;
  return (taskOwner || '').toLowerCase().includes(filter.toLowerCase());
}

/* ---------- Data prep ---------- */
function prepareTasks(rawRows) {
  const today = new Date();
  today.setHours(0,0,0,0);
  return rawRows
    .filter(t => t['Task Name'] && t['Task Name'] !== 'TASK' && !t['Task Name'].startsWith('#') && t['Task Name'].trim() !== '')
    .map((t, i) => {
      const endDate = parseTaskDate(t['End Date']);
      const overdue = !!(endDate && endDate < today && t.Status !== 'Completed');
      return { ...t, __id: i, __overdue: overdue };
    });
}
function applyFilters(tasks) {
  return tasks.filter(t => ownerMatches(t.Owner, ownerFilter) && (!statusFilter || t.Status === statusFilter));
}

/* ---------- Task detail modal ---------- */
function closeModal() {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  document.removeEventListener('keydown', onModalKeydown);
}
function onModalKeydown(e) {
  if (e.key === 'Escape') closeModal();
}
function openTaskModal(task) {
  closeModal();
  const color = PHASE_COLORS[task.Phase] || '#888';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-hdr">
        <div class="modal-title-wrap">
          <div class="modal-dot" style="background:${color}"></div>
          <div class="modal-title">${esc(task['Task Name'])}</div>
        </div>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-progress">${esc(PHASE_SHORT[task.Phase] || task.Phase)}</div>
      <div class="pills" style="justify-content:flex-start;margin-bottom:14px">
        ${priPill(task.Priority)}
        <span class="pill ${pillClass(task.Status)}">${esc(task.Status)}</span>
        ${task.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
      </div>
      <div class="modal-field-row"><span class="modal-field-label">Owner</span><span class="modal-field-val">${esc(task.Owner)}</span></div>
      <div class="modal-field-row"><span class="modal-field-label">Start date</span><span class="modal-field-val">${esc(task['Start Date'])}</span></div>
      <div class="modal-field-row"><span class="modal-field-label">End date</span><span class="modal-field-val">${esc(task['End Date'])}</span></div>
      <div class="modal-field-row"><span class="modal-field-label">Phase</span><span class="modal-field-val">${esc(task.Phase)}</span></div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.querySelector('.modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', onModalKeydown);
  document.body.appendChild(overlay);
}

/* ---------- Phase detail modal ---------- */
function openPhaseModal(phaseKey, ownerFilteredTasks) {
  closeModal();
  const tasks = ownerFilteredTasks.filter(t => t.Phase === phaseKey);
  const completedCt = tasks.filter(t => t.Status === 'Completed').length;
  const activeCt = tasks.filter(t => ['In Progress', 'Ongoing', 'Completed'].includes(t.Status)).length;
  const overdueCt = tasks.filter(t => t.__overdue).length;
  const pct = tasks.length ? Math.round((activeCt / tasks.length) * 100) : 0;
  const color = PHASE_COLORS[phaseKey] || '#888';

  const statusOrder = { 'In Progress': 0, 'Ongoing': 1, 'Not Started': 2, 'Completed': 3 };
  const sorted = [...tasks].sort((a, b) => (a.__overdue === b.__overdue ? 0 : a.__overdue ? -1 : 1) || ((statusOrder[a.Status] ?? 9) - (statusOrder[b.Status] ?? 9)));

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-hdr">
        <div class="modal-title-wrap">
          <div class="modal-dot" style="background:${color}"></div>
          <div class="modal-title">${esc(PHASE_SHORT[phaseKey] || phaseKey)}</div>
        </div>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-progress">${activeCt} of ${tasks.length} tasks active or complete · ${completedCt} completed${overdueCt ? ` · <span style="color:#ff6b4a">${overdueCt} overdue</span>` : ''} · ${pct}%</div>
      <div class="modal-track"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
      <div id="phaseModalTaskList"></div>
    </div>
  `;
  const listEl = overlay.querySelector('#phaseModalTaskList');
  if (sorted.length) {
    sorted.forEach(t => {
      const row = document.createElement('div');
      row.className = 'task-row clickable-task';
      row.innerHTML = `
        <div style="flex:1">
          <div class="task-name">${esc(t['Task Name'])}</div>
          <div class="task-meta">${esc(t.Owner)} · ${esc(t['Start Date'])} – ${esc(t['End Date'])}</div>
        </div>
        <div class="pills">
          ${t.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
          ${priPill(t.Priority)}
          <span class="pill ${pillClass(t.Status)}">${esc(t.Status)}</span>
        </div>`;

}

function renderAll() {

}

function toggleStatusFilter(status) {
  statusFilter = (statusFilter === status) ? null : status;
  renderAll();
}

function renderTableList(valid) {
  const listEl = document.getElementById('tableList');
  const countEl = document.getElementById('tableCount');
  if (!listEl) return;
  const q = tableSearch.trim().toLowerCase();
  const filtered = q ? valid.filter(t => (t['Task Name']||'').toLowerCase().includes(q)) : valid;
  countEl.textContent = `${filtered.length} of ${valid.length}`;
  listEl.innerHTML = '';
  if (!filtered.length) {
    listEl.innerHTML = '<div class="table-empty">No tasks match your search.</div>';
    return;
  }
  filtered.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row clickable-task';
    row.innerHTML = `
      <div style="flex:1">
        <div class="task-name">${esc(t['Task Name'])}</div>
        <div class="task-meta">${esc(t.Owner)} · ${esc(t['Start Date'])} – ${esc(t['End Date'])}</div>
      </div>
      <div class="pills">
        <span class="table-phase-pill">${esc((t.Phase||'').split('—')[0].trim())}</span>
        ${t.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
        ${priPill(t.Priority)}
        <span class="pill ${pillClass(t.Status)}">${esc(t.Status)}</span>
      </div>`;
    row.addEventListener('click', () => openTaskModal(t));
    listEl.appendChild(row);
  });
}

function showOverdueModal(valid) {
  closeModal();

  const listEl = overlay.querySelector('#overdueModalList');
  overdue
    .sort((a,b) => new Date(a['End Date']+' 2026') - new Date(b['End Date']+' 2026'))
    .forEach(t => {

      listEl.appendChild(row);

  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.querySelector('.modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', onModalKeydown);
  document.body.appendChild(overlay);
}

/* ---------- Data load ---------- */
function loadData(manual) {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.innerHTML = '<i class="ti ti-refresh"></i> Refreshing...';
  if (!document.querySelector('.hdr')) {
    document.getElementById('root').innerHTML = '<div class="loading">Loading Bando Bodega dashboard...</div>';
  }

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: results => { RAW_TASKS = prepareTasks(results.data); renderAll(); },
    error: () => { RAW_TASKS = prepareTasks(FALLBACK); renderAll(); }
  });
}
