<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bando Bodega — Project Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Oswald:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>


  /*
    Logo-ready version:
    Put your logo file at /assets/bando-logo.png next to this index.html file.
    For GitHub Pages, use this structure:
      index.html
      assets/bando-logo.png
    If the logo file is missing, the dashboard automatically falls back to the BB mark.
  */

  /*
    Bando Bodega branded skin
    Inspired by the submitted report: streetwear/sport energy, black base,
    punch red, varsity yellow, warm paper/gold neutrals.
    Structure + JavaScript behavior intentionally left intact.

    Font system v2:
    - Archivo Black for brand marks / hero moments
    - Oswald for sporty labels, badges, numerals
    - Space Grotesk for readable task content
  */
  :root {
    --bb-black: #050505;
    --bb-black-2: #0b0907;
    --bb-panel: #14110d;
    --bb-panel-2: #1b1710;
    --bb-card: #16120f;
    --bb-card-hover: #211b13;
    --bb-ink: #fff8e8;
    --bb-cream: #f6efe1;
    --bb-muted: #a59a7a;
    --bb-dim: #6f664f;
    --bb-line: rgba(248,185,4,.18);
    --bb-line-strong: rgba(231,14,13,.36);
    --bb-red: #e70e0d;
    --bb-red-soft: #ff3b2f;
    --bb-yellow: #f8b904;
    --bb-yellow-2: #ffd84a;
    --bb-gold: #c68808;
    --bb-green: #408f42;
    --bb-radius: 18px;
    --bb-shadow: 0 18px 50px rgba(0,0,0,.45);
    --bb-display: "Archivo Black", Impact, Haettenschweiler, "Arial Narrow", sans-serif;
    --bb-condensed: "Oswald", "Arial Narrow", sans-serif;
    --bb-body: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bb-black); }
  body {
    font-family: var(--bb-body);
    background:
      radial-gradient(circle at 16% -8%, rgba(231,14,13,.32) 0, transparent 32%),
      radial-gradient(circle at 92% 10%, rgba(248,185,4,.22) 0, transparent 28%),
      linear-gradient(135deg, rgba(255,255,255,.045) 0 1px, transparent 1px) 0 0 / 26px 26px,
      linear-gradient(180deg, #050505 0%, #0b0907 46%, #050505 100%);
    color: var(--bb-ink);
    min-height: 100vh;
    letter-spacing: 0;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background:
      linear-gradient(90deg, transparent 0 9%, rgba(248,185,4,.06) 9.2% 9.4%, transparent 9.6% 100%),
      repeating-linear-gradient(0deg, rgba(255,248,232,.035) 0 1px, transparent 1px 7px);
    mix-blend-mode: screen;
    opacity: .42;
  }

  .db { padding: 1.35rem; max-width: 1440px; margin: 0 auto; }

  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.15rem;
    padding: 18px;
    border: 1px solid var(--bb-line);
    border-radius: 24px;
    flex-wrap: wrap;
    gap: 14px;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(120deg, rgba(231,14,13,.22), rgba(248,185,4,.08) 42%, rgba(255,255,255,.03)),
      #090806;
    box-shadow: var(--bb-shadow);
  }
  .hdr::before {
    content: "BANDO BODEGA";
    position: absolute;
    right: 16px;
    bottom: -31px;
    font-family: var(--bb-display);
    font-size: clamp(44px, 8vw, 112px);
    letter-spacing: -.06em;
    line-height: .78;
    color: rgba(255,248,232,.035);
    white-space: nowrap;
    pointer-events: none;
  }
  .hdr::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, var(--bb-red) 0 9px, transparent 9px calc(100% - 9px), var(--bb-yellow) calc(100% - 9px)),
      linear-gradient(0deg, transparent, rgba(255,255,255,.04));
  }
  .brand, .hdr-right { position: relative; z-index: 1; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 58px;
    height: 58px;
    background: #050505;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px;
    border: 2px solid var(--bb-red);
    box-shadow:
      0 0 0 1px rgba(248,185,4,.42),
      0 12px 30px rgba(231,14,13,.25);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo::after {
    content: "";
    position: absolute;
    inset: -35%;
    background: linear-gradient(45deg, transparent 43%, rgba(248,185,4,.22) 44% 47%, transparent 48%);
    transform: translateX(-9px);
    opacity: .85;
    pointer-events: none;
    z-index: 1;
  }
  .logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    position: relative;
    z-index: 2;
  }
  .logo-fallback {
    display: none;
    position: relative;
    z-index: 2;
    font-family: var(--bb-display);
    font-size: 21px;
    font-weight: 900;
    color: var(--bb-yellow);
    letter-spacing: .02em;
    text-shadow: 0 1px 0 rgba(255,255,255,.16);
  }
  .brand-name {
    font-family: var(--bb-display);
    font-size: clamp(28px, 3.4vw, 46px);
    line-height: .95;
    font-weight: 900;
    color: var(--bb-cream);
    letter-spacing: -.055em;
    text-transform: uppercase;
  }
  .brand-sub {
    font-family: var(--bb-condensed);
    font-size: 12px;
    color: var(--bb-yellow);
    margin-top: 7px;
    text-transform: uppercase;
    letter-spacing: .18em;
    font-weight: 800;
  }
  .hdr-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge-green, .badge-orange, .badge-red {
    border-radius: 999px;
    padding: 7px 13px;
    font-family: var(--bb-condensed);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .09em;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    backdrop-filter: blur(10px);
  }
  .badge-green { background: rgba(64,143,66,.14); color: #9de36c; border: 1px solid rgba(64,143,66,.5); }
  .badge-orange { background: rgba(248,185,4,.13); color: var(--bb-yellow-2); border: 1px solid rgba(248,185,4,.5); }
  .badge-red { background: rgba(231,14,13,.15); color: #ff7a69; border: 1px solid rgba(231,14,13,.55); }
  .refresh-btn {
    background: rgba(5,5,5,.65);
    color: var(--bb-cream);
    border: 1px solid var(--bb-line);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
    cursor: pointer;
    transition: all .2s;
  }
  .refresh-btn:hover { background: var(--bb-red); color: #fff; border-color: var(--bb-red); transform: translateY(-1px); }
  .last-updated { font-size: 10px; color: var(--bb-dim); text-transform: uppercase; letter-spacing: .08em; }

  /* Controls bar */
  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1rem;
    padding: 8px 2px;
  }
  .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label {
    font-family: var(--bb-condensed);
    font-size: 11px;
    color: var(--bb-muted);
    text-transform: uppercase;
    letter-spacing: .11em;
    font-weight: 700;
  }
  .chip {
    background: rgba(22,18,15,.95);
    color: var(--bb-muted);
    border: 1px solid var(--bb-line);
    border-radius: 999px;
    padding: 7px 14px;
    font-family: var(--bb-condensed);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--bb-yellow); color: var(--bb-cream); transform: translateY(-1px); }
  .chip.active,
  .chip.active.chip-blue,
  .chip.active.chip-purple,
  .chip.active.chip-gray,
  .chip.active.chip-green {
    background: linear-gradient(135deg, var(--bb-red), #9d0707);
    color: #fff;
    border-color: var(--bb-red);
    box-shadow: 0 10px 24px rgba(231,14,13,.22);
  }
  .chip-clear {
    background: none;
    border: none;
    color: var(--bb-yellow);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    padding: 5px 4px;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 800;
  }
  .chip-clear:hover { color: var(--bb-cream); }
  .table-toggle-btn {
    background: linear-gradient(135deg, rgba(248,185,4,.15), rgba(231,14,13,.08));
    color: var(--bb-cream);
    border: 1px solid var(--bb-line);
    border-radius: 999px;
    padding: 9px 17px;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all .15s;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .table-toggle-btn:hover { border-color: var(--bb-yellow); transform: translateY(-1px); }
  .table-toggle-btn.active { background: var(--bb-yellow); border-color: var(--bb-yellow); color: #050505; }

  .alert-banner {
    display: flex;
    align-items: center;
    gap: 11px;
    background: linear-gradient(135deg, rgba(231,14,13,.2), rgba(248,185,4,.08));
    border: 1px solid rgba(231,14,13,.55);
    border-radius: 18px;
    padding: 13px 16px;
    margin-bottom: 1rem;
    font-size: 12px;
    color: #ffc1a8;
    cursor: pointer;
    transition: all .15s;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
  }
  .alert-banner:hover { background: rgba(231,14,13,.26); transform: translateY(-1px); }
  .alert-banner i { font-size: 18px; color: var(--bb-red-soft); flex-shrink: 0; }

  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .kpi {
    background:
      linear-gradient(180deg, rgba(255,248,232,.06), transparent),
      var(--bb-card);
    border-radius: var(--bb-radius);
    padding: 15px 17px;
    border: 1px solid var(--bb-line);
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 34px rgba(0,0,0,.25);
  }
  .kpi::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 5px;
    height: 100%;
    background: var(--bb-red);
    opacity: .9;
  }
  .kpi::after {
    content: "";
    position: absolute;
    right: -26px;
    top: -30px;
    width: 86px;
    height: 86px;
    background: radial-gradient(circle, rgba(248,185,4,.16), transparent 62%);
  }
  .kpi-label {
    font-size: 10px;
    color: var(--bb-muted);
    text-transform: uppercase;
    letter-spacing: .14em;
    margin-bottom: 7px;
    font-weight: 900;
  }
  .kpi-val {
    font-family: var(--bb-condensed);
    font-size: 40px;
    font-weight: 700;
    color: var(--bb-cream);
    line-height: .88;
    letter-spacing: .02em;
  }
  .kpi-sub { font-size: 11px; color: var(--bb-dim); margin-top: 8px; }
  .kpi-orange .kpi-val { color: var(--bb-yellow); }
  .kpi-yellow .kpi-val { color: var(--bb-yellow-2); }
  .kpi-green .kpi-val { color: #9de36c; }
  .kpi-blue .kpi-val { color: var(--bb-yellow); }
  .kpi-red .kpi-val { color: var(--bb-red-soft); }
  .kpi.clickable { cursor: pointer; transition: border-color .15s, transform .15s; }
  .kpi.clickable:hover { border-color: var(--bb-yellow); transform: translateY(-2px); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .grid3 { display: grid; grid-template-columns: minmax(0,1.5fr) minmax(0,.5fr); gap: 12px; margin-bottom: 12px; }
  .grid2b { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .card {
    background:
      linear-gradient(180deg, rgba(255,248,232,.055), rgba(255,248,232,.015)),
      var(--bb-card);
    border-radius: var(--bb-radius);
    padding: 18px 20px;
    border: 1px solid var(--bb-line);
    box-shadow: 0 14px 42px rgba(0,0,0,.28);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 4px;
    background: linear-gradient(90deg, var(--bb-red), var(--bb-yellow));
    opacity: .88;
  }
  .card-title {
    font-family: var(--bb-condensed);
    font-size: 15px;
    font-weight: 700;
    color: var(--bb-cream);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title i { font-size: 17px; color: var(--bb-yellow); }
  .card-title-hint {
    margin-left: auto;
    font-family: var(--bb-body);
    text-transform: uppercase;
    font-weight: 900;
    color: var(--bb-dim);
    font-size: 9px;
    letter-spacing: .08em;
  }

  .phase-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-radius: 12px; padding: 7px 8px; margin-left: -8px; margin-right: -8px; transition: background .15s, transform .15s; }
  .phase-row.clickable { cursor: pointer; }
  .phase-row.clickable:hover { background: var(--bb-card-hover); transform: translateX(2px); }
  .phase-row.clickable:hover .phase-name { color: var(--bb-cream); }
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(255,255,255,.04); }
  .phase-name { font-size: 12px; color: var(--bb-muted); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s; font-weight: 700; }
  .phase-pct { font-family: var(--bb-condensed); font-size: 16px; font-weight: 700; color: var(--bb-yellow); min-width: 46px; text-align: right; }
  .phase-chevron { font-size: 12px; color: var(--bb-dim); flex-shrink: 0; }
  .track { flex: 1; height: 7px; background: rgba(255,248,232,.09); border-radius: 99px; overflow: hidden; border: 1px solid rgba(255,255,255,.04); }
  .fill { height: 100%; border-radius: 99px; transition: width .6s ease; }

  .task-row { display: flex; align-items: flex-start; gap: 9px; padding: 10px 0; border-bottom: 1px solid rgba(255,248,232,.08); }
  .task-row:last-child { border-bottom: none; }
  .task-row.clickable-task { cursor: pointer; border-radius: 12px; padding: 10px 8px; margin: 0 -8px; transition: background .15s, transform .15s; }
  .task-row.clickable-task:hover { background: var(--bb-card-hover); transform: translateX(2px); }
  .task-row.clickable-task:hover .task-name { color: var(--bb-cream); }
  .task-name { font-size: 12px; color: #e9dfc6; flex: 1; line-height: 1.45; transition: color .15s; font-weight: 700; }
  .task-meta { font-size: 10px; color: var(--bb-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .pills { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  .pill {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 900;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .pill-red { background: rgba(231,14,13,.15); color: #ff7a69; border: 1px solid rgba(231,14,13,.5); }
  .pill-yellow { background: rgba(248,185,4,.15); color: var(--bb-yellow-2); border: 1px solid rgba(248,185,4,.46); }
  .pill-blue { background: rgba(248,185,4,.15); color: var(--bb-yellow-2); border: 1px solid rgba(248,185,4,.46); }
  .pill-purple { background: rgba(198,136,8,.16); color: #f4c25a; border: 1px solid rgba(198,136,8,.5); }
  .pill-gray { background: rgba(255,248,232,.08); color: var(--bb-muted); border: 1px solid rgba(255,248,232,.14); }
  .pill-green { background: rgba(64,143,66,.14); color: #9de36c; border: 1px solid rgba(64,143,66,.48); }
  .pill-overdue { background: rgba(231,14,13,.22); color: #fff; border: 1px solid rgba(231,14,13,.68); box-shadow: 0 0 20px rgba(231,14,13,.12); }

  .tl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .tl-label { font-size: 11px; color: var(--bb-muted); min-width: 112px; flex-shrink: 0; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; }
  .tl-track { flex: 1; height: 10px; background: rgba(255,248,232,.08); border-radius: 99px; position: relative; overflow: hidden; border: 1px solid rgba(255,248,232,.06); }
  .tl-bar { height: 100%; border-radius: 99px; position: absolute; box-shadow: 0 0 22px rgba(248,185,4,.2); }
  .tl-months { display: flex; justify-content: space-between; padding-left: 122px; margin-top: 8px; }
  .tl-month { font-size: 10px; color: var(--bb-dim); text-transform: uppercase; font-weight: 900; letter-spacing: .08em; }

  .dl-row { display: flex; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(255,248,232,.08); gap: 8px; }
  .dl-row:last-child { border-bottom: none; }
  .dl-row.clickable-task { cursor: pointer; border-radius: 12px; padding: 9px 8px; margin: 0 -8px; transition: background .15s, transform .15s; }
  .dl-row.clickable-task:hover { background: var(--bb-card-hover); transform: translateX(2px); }
  .dl-name { font-size: 12px; color: #e9dfc6; flex: 1; font-weight: 700; }
  .dl-phase { font-size: 10px; color: var(--bb-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: .05em; }
  .dl-date { font-family: var(--bb-condensed); font-size: 14px; color: var(--bb-yellow); min-width: 48px; text-align: right; flex-shrink: 0; }

  .action-row { display: flex; align-items: flex-start; gap: 11px; padding: 10px 0; border-bottom: 1px solid rgba(255,248,232,.08); }
  .action-row:last-child { border-bottom: none; }
  .action-num {
    width: 26px;
    height: 26px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--bb-condensed);
    font-size: 13px;
    font-weight: 400;
    flex-shrink: 0;
    color: #050505;
    border: 1px solid rgba(255,248,232,.26);
  }
  .action-text { font-size: 12px; color: #e0d4b9; line-height: 1.55; flex: 1; font-weight: 600; }

  .ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
  .ring-num { font-family: var(--bb-condensed); font-size: 44px; font-weight: 700; color: var(--bb-yellow); margin-top: 9px; line-height: .9; }
  .ring-sub { font-size: 11px; color: var(--bb-muted); margin-top: 6px; text-align: center; line-height: 1.4; text-transform: uppercase; letter-spacing: .06em; font-weight: 800; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 13px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--bb-muted); cursor: pointer; padding: 5px 8px; border-radius: 999px; transition: all .15s; border: 1px solid transparent; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
  .legend-item:hover { background: var(--bb-card-hover); color: var(--bb-cream); border-color: var(--bb-line); }
  .legend-item.active-filter { color: #050505; background: var(--bb-yellow); font-weight: 900; }
  .legend-dot { width: 9px; height: 9px; border-radius: 3px; }

  .loading { color: var(--bb-muted); font-size: 14px; padding: 3rem; text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; }
  .error-msg { color: #ffc1a8; font-size: 12px; padding: 1rem; background: rgba(231,14,13,.14); border-radius: 12px; border: 1px solid rgba(231,14,13,.45); margin-bottom: 1rem; }

  .footer {
    text-align: center;
    font-family: var(--bb-condensed);
    font-size: 13px;
    color: rgba(248,185,4,.68);
    padding: 1.6rem 0 .6rem;
    border-top: 1px solid var(--bb-line);
    margin-top: 1rem;
    letter-spacing: .18em;
    text-transform: uppercase;
  }

  /* All-tasks table */
  .table-card { margin-bottom: 12px; }
  .table-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .table-search {
    flex: 1;
    background: rgba(5,5,5,.52);
    border: 1px solid var(--bb-line);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--bb-cream);
    outline: none;
    font-weight: 700;
  }
  .table-search:focus { border-color: var(--bb-yellow); box-shadow: 0 0 0 3px rgba(248,185,4,.09); }
  .table-search::placeholder { color: var(--bb-dim); }

<div class="db" id="root">
  <div class="loading"><i class="ti ti-loader"></i> Loading Bando Bodega dashboard...</div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgYAZEQZzb3QPLXh8pP0eZYsOwHHwJsZz2l1qaB1mIj945McPNQQay9SD_OI_6PB4OogENRHWRS2Ce/pub?gid=2136691439&single=true&output=csv';

// How often to silently pull fresh data from the Google Sheet, in milliseconds.
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5 minutes

const PHASE_COLORS = {
  'Phase 0 — Ops Stabilization': '#e70e0d',
  'Phase 1 — Quick Wins': '#f8b904',
  'Phase 2 — Product Drops': '#408f42',
  'Phase 3 — Bando Bodega Build': '#c68808',
  'Ongoing — Full Engagement Duration': '#ff3b2f'
};
const PHASE_SHORT = {
  'Phase 0 — Ops Stabilization': 'Phase 0 — Ops',
  'Phase 1 — Quick Wins': 'Phase 1 — Quick wins',
  'Phase 2 — Product Drops': 'Phase 2 — Products',
  'Phase 3 — Bando Bodega Build': 'Phase 3 — Build',
  'Ongoing — Full Engagement Duration': 'Ongoing'
};
const PHASES_ORDER = ['Phase 0 — Ops Stabilization','Phase 1 — Quick Wins','Phase 2 — Product Drops','Phase 3 — Bando Bodega Build','Ongoing — Full Engagement Duration'];

/* ---------- State ---------- */
let RAW_TASKS = [];         // all parsed tasks, cleaned + annotated (id, overdue)
let ownerFilter = 'All';    // 'All' | 'Darius' | 'Terry'
let statusFilter = null;    // null | 'In Progress' | 'Not Started' | 'Ongoing' | 'Completed'
let showAllTable = false;
let tableSearch = '';
let statusChartInst = null;
let readyChartInst = null;

/* ---------- Helpers ---------- */
function pillClass(s) {
  if (!s) return 'pill-gray';
  const l = s.toLowerCase();
  if (l === 'in progress') return 'pill-blue';
  if (l === 'ongoing') return 'pill-purple';
  if (l === 'completed') return 'pill-green';
  return 'pill-gray';
}
function priPill(p) {
  if (!p) return '';
  const l = p.toLowerCase();
  if (l === 'high') return '<span class="pill pill-red">High</span>';
  if (l === 'medium') return '<span class="pill pill-yellow">Med</span>';
  return '<span class="pill pill-gray">Low</span>';
}
function daysToLaunch() {
  return Math.max(0, Math.ceil((new Date('2026-10-03') - new Date()) / 86400000));
}
function nowStr() {
  return new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function esc(str) {
  return (str || '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function parseTaskDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + ' 2026');
  return isNaN(d) ? null : d;
}
function ownerMatches(taskOwner, filter) {
  if (filter === 'All') return true;
  return (taskOwner || '').toLowerCase().includes(filter.toLowerCase());
}

/* ---------- Data prep ---------- */
function prepareTasks(rawRows) {
  const today = new Date();
  today.setHours(0,0,0,0);
  return rawRows
    .filter(t => t['Task Name'] && t['Task Name'] !== 'TASK' && !t['Task Name'].startsWith('#') && t['Task Name'].trim() !== '')
    .map((t, i) => {
      const endDate = parseTaskDate(t['End Date']);
      const overdue = !!(endDate && endDate < today && t.Status !== 'Completed');
      return { ...t, __id: i, __overdue: overdue };
    });
}
function applyFilters(tasks) {
  return tasks.filter(t => ownerMatches(t.Owner, ownerFilter) && (!statusFilter || t.Status === statusFilter));
}

/* ---------- Task detail modal ---------- */
function closeModal() {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  document.removeEventListener('keydown', onModalKeydown);
}
function onModalKeydown(e) {
  if (e.key === 'Escape') closeModal();
}
function openTaskModal(task) {
  closeModal();
  const color = PHASE_COLORS[task.Phase] || '#888';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-hdr">
        <div class="modal-title-wrap">
          <div class="modal-dot" style="background:${color}"></div>
          <div class="modal-title">${esc(task['Task Name'])}</div>
        </div>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-progress">${esc(PHASE_SHORT[task.Phase] || task.Phase)}</div>
      <div class="pills" style="justify-content:flex-start;margin-bottom:14px">
        ${priPill(task.Priority)}
        <span class="pill ${pillClass(task.Status)}">${esc(task.Status)}</span>
        ${task.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
      </div>
      <div class="modal-field-row"><span class="modal-field-label">Owner</span><span class="modal-field-val">${esc(task.Owner)}</span></div>
      <div class="modal-field-row"><span class="modal-field-label">Start date</span><span class="modal-field-val">${esc(task['Start Date'])}</span></div>
      <div class="modal-field-row"><span class="modal-field-label">End date</span><span class="modal-field-val">${esc(task['End Date'])}</span></div>
      <div class="modal-field-row"><span class="modal-field-label">Phase</span><span class="modal-field-val">${esc(task.Phase)}</span></div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.querySelector('.modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', onModalKeydown);
  document.body.appendChild(overlay);
}

/* ---------- Phase detail modal ---------- */
function openPhaseModal(phaseKey, ownerFilteredTasks) {
  closeModal();
  const tasks = ownerFilteredTasks.filter(t => t.Phase === phaseKey);
  const completedCt = tasks.filter(t => t.Status === 'Completed').length;
  const activeCt = tasks.filter(t => ['In Progress', 'Ongoing', 'Completed'].includes(t.Status)).length;
  const overdueCt = tasks.filter(t => t.__overdue).length;
  const pct = tasks.length ? Math.round((activeCt / tasks.length) * 100) : 0;
  const color = PHASE_COLORS[phaseKey] || '#888';

  const statusOrder = { 'In Progress': 0, 'Ongoing': 1, 'Not Started': 2, 'Completed': 3 };
  const sorted = [...tasks].sort((a, b) => (a.__overdue === b.__overdue ? 0 : a.__overdue ? -1 : 1) || ((statusOrder[a.Status] ?? 9) - (statusOrder[b.Status] ?? 9)));

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-hdr">
        <div class="modal-title-wrap">
          <div class="modal-dot" style="background:${color}"></div>
          <div class="modal-title">${esc(PHASE_SHORT[phaseKey] || phaseKey)}</div>
        </div>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-progress">${activeCt} of ${tasks.length} tasks active or complete · ${completedCt} completed${overdueCt ? ` · <span style="color:#ff6b4a">${overdueCt} overdue</span>` : ''} · ${pct}%</div>
      <div class="modal-track"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
      <div id="phaseModalTaskList"></div>
    </div>
  `;
  const listEl = overlay.querySelector('#phaseModalTaskList');
  if (sorted.length) {
    sorted.forEach(t => {
      const row = document.createElement('div');
      row.className = 'task-row clickable-task';
      row.innerHTML = `
        <div style="flex:1">
          <div class="task-name">${esc(t['Task Name'])}</div>
          <div class="task-meta">${esc(t.Owner)} · ${esc(t['Start Date'])} – ${esc(t['End Date'])}</div>
        </div>
        <div class="pills">
          ${t.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
          ${priPill(t.Priority)}
          <span class="pill ${pillClass(t.Status)}">${esc(t.Status)}</span>
        </div>`;
      row.addEventListener('click', () => openTaskModal(t));
      listEl.appendChild(row);
    });
  } else {
    listEl.innerHTML = '<div class="modal-empty">No tasks found for this phase.</div>';
  }
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.querySelector('.modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', onModalKeydown);
  document.body.appendChild(overlay);
}

/* ---------- Main render ---------- */
function renderAll() {
  const ownerScoped = RAW_TASKS.filter(t => ownerMatches(t.Owner, ownerFilter));
  const valid = applyFilters(RAW_TASKS);
  render(valid, ownerScoped);
}

function render(valid, ownerScoped) {
  const total = valid.length;
  const inProg = valid.filter(t => t.Status === 'In Progress').length;
  const notStart = valid.filter(t => t.Status === 'Not Started').length;
  const ongoing = valid.filter(t => t.Status === 'Ongoing').length;
  const completed = valid.filter(t => t.Status === 'Completed').length;
  const highPri = valid.filter(t => t.Priority === 'High').length;
  const overdueTasks = valid.filter(t => t.__overdue);
  const active = inProg + ongoing + completed;
  const pct = total ? Math.round((active / total) * 100) : 0;

  const phaseStats = PHASES_ORDER.map(ph => {
    const pt = ownerScoped.filter(t => t.Phase === ph);
    const pa = pt.filter(t => ['In Progress','Ongoing','Completed'].includes(t.Status)).length;
    return { ph, total: pt.length, active: pa, pct: pt.length ? Math.round((pa / pt.length) * 100) : 0 };
  });

  const topTasks = valid.filter(t => t.Priority === 'High' && t.Status !== 'Completed')

  const upcoming = valid.filter(t => t['End Date'] && t.Status !== 'Completed')
    .sort((a, b) => new Date(a['End Date'] + ' 2026') - new Date(b['End Date'] + ' 2026'))
    .slice(0, 6);

  const actions = [

    { label: 'Phase 3 — Build', color: '#c68808', left: 36, width: 46 },
    { label: 'Ongoing', color: '#ff3b2f', left: 15, width: 82 }

  const statusLabels = { 'In Progress': inProg, 'Not Started': notStart, 'Ongoing': ongoing, 'Completed': completed };

  document.getElementById('root').innerHTML = `

        ${statusFilter ? `<span class="filter-label" style="margin-left:8px">Status</span><button class="chip active" id="statusChipActive">${esc(statusFilter)}</button><button class="chip-clear" id="clearStatusFilter">clear</button>` : ''}

        ${['May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map(m => `<span class="tl-month">${m}</span>`).join('')}

    </div>

    <div class="grid2b">
      <div class="card">
        <div class="card-title"><i class="ti ti-clock-exclamation"></i> Upcoming deadlines</div>
        <div id="upcomingList"></div>
        ${!upcoming.length ? '<div class="modal-empty">Nothing upcoming matches the current filters.</div>' : ''}

      <div class="card">
        <div class="card-title"><i class="ti ti-bolt"></i> Next executive actions</div>
        ${actions.map((a,i) => `
          <div class="action-row">
            <div class="action-num" style="background:${a.color}">${i+1}</div>
            <div class="action-text">${esc(a.text)}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="footer">Street Food · Art · Culture · Opportunity · Community</div>

  // Build clickable task rows via DOM (avoids escaping headaches, keeps live object refs)
  const topTasksList = document.getElementById('topTasksList');
  topTasks.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row clickable-task';
    row.innerHTML = `
      <div style="flex:1">
        <div class="task-name">${esc(t['Task Name'])}</div>
        <div class="task-meta">${esc((t.Phase||'').split('—')[0].trim())} · ${esc(t.Owner)} · Due ${esc(t['End Date'])}</div>
      </div>
      <div class="pills">
        ${t.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
        ${priPill(t.Priority)}
        <span class="pill ${pillClass(t.Status)}">${esc(t.Status)}</span>
      </div>`;
    row.addEventListener('click', () => openTaskModal(t));
    topTasksList.appendChild(row);
  });

  upcoming.forEach(t => {
    const row = document.createElement('div');

      <div style="flex:1">
        <div class="dl-name">${esc(t['Task Name'])}</div>
        <div class="dl-phase">${esc((t.Phase||'').split('—')[0].trim())}</div>

      <div class="dl-date">${esc(t['End Date'])}</div>

    upcomingList.appendChild(row);
  });

  if (showAllTable) {
    renderTableList(valid);
    const searchInput = document.getElementById('tableSearchInput');
    searchInput.addEventListener('input', e => {
      tableSearch = e.target.value;
      renderTableList(valid);
    });
    searchInput.focus();
    searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
  }

  if (statusChartInst) statusChartInst.destroy();
  if (readyChartInst) readyChartInst.destroy();

  statusChartInst = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
      labels: ['In progress','Not started','Ongoing','Completed'],
      datasets: [{ data: [inProg, notStart, ongoing, completed], backgroundColor: ['#f8b904','#393500','#ff3b2f','#408f42'], borderWidth: 2, borderColor: '#16120f' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const labelsMap = ['In Progress','Not Started','Ongoing','Completed'];
        toggleStatusFilter(labelsMap[elements[0].index]);
      },
      plugins: { legend: { display: false }, tooltip: { enabled: true } },
      onHover: (evt, elements) => { evt.native.target.style.cursor = elements.length ? 'pointer' : 'default'; }

  });

  readyChartInst = new Chart(document.getElementById('readyChart'), {
    type: 'doughnut',
    data: {
      labels: ['Active/done','Remaining'],
      datasets: [{ data: [active, notStart], backgroundColor: ['#f8b904','#211b13'], borderWidth: 0 }]

    btn.addEventListener('click', () => { ownerFilter = btn.getAttribute('data-owner'); renderAll(); });

  });

  if (overdueKpi && overdueTasks.length) overdueKpi.addEventListener('click', () => showOverdueModal(valid));
  const toggleTableBtn = document.getElementById('toggleTableBtn');
  if (toggleTableBtn) toggleTableBtn.addEventListener('click', () => { showAllTable = !showAllTable; renderAll(); });
}

function toggleStatusFilter(status) {
  statusFilter = (statusFilter === status) ? null : status;
  renderAll();
}

function renderTableList(valid) {
  const listEl = document.getElementById('tableList');
  const countEl = document.getElementById('tableCount');
  if (!listEl) return;
  const q = tableSearch.trim().toLowerCase();
  const filtered = q ? valid.filter(t => (t['Task Name']||'').toLowerCase().includes(q)) : valid;
  countEl.textContent = `${filtered.length} of ${valid.length}`;
  listEl.innerHTML = '';
  if (!filtered.length) {
    listEl.innerHTML = '<div class="table-empty">No tasks match your search.</div>';
    return;
  }
  filtered.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row clickable-task';
    row.innerHTML = `
      <div style="flex:1">
        <div class="task-name">${esc(t['Task Name'])}</div>
        <div class="task-meta">${esc(t.Owner)} · ${esc(t['Start Date'])} – ${esc(t['End Date'])}</div>
      </div>
      <div class="pills">
        <span class="table-phase-pill">${esc((t.Phase||'').split('—')[0].trim())}</span>
        ${t.__overdue ? '<span class="pill pill-overdue">Overdue</span>' : ''}
        ${priPill(t.Priority)}
        <span class="pill ${pillClass(t.Status)}">${esc(t.Status)}</span>
      </div>`;
    row.addEventListener('click', () => openTaskModal(t));
    listEl.appendChild(row);
  });
}

function showOverdueModal(valid) {
  closeModal();
  const overdue = valid.filter(t => t.__overdue);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-hdr">
        <div class="modal-title-wrap">
          <div class="modal-dot" style="background:#ff6b4a"></div>
          <div class="modal-title">Overdue tasks</div>
        </div>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-progress">${overdue.length} task${overdue.length!==1?'s':''} past due date, not yet completed</div>
      <div id="overdueModalList"></div>
    </div>
  `;
  const listEl = overlay.querySelector('#overdueModalList');
  overdue
    .sort((a,b) => new Date(a['End Date']+' 2026') - new Date(b['End Date']+' 2026'))
    .forEach(t => {
      const row = document.createElement('div');
      row.className = 'task-row clickable-task';
      row.innerHTML = `
        <div style="flex:1">
          <div class="task-name">${esc(t['Task Name'])}</div>
          <div class="task-meta">${esc((t.Phase||'').split('—')[0].trim())} · ${esc(t.Owner)} · Was due ${esc(t['End Date'])}</div>
        </div>
        <div class="pills">${priPill(t.Priority)}<span class="pill ${pillClass(t.Status)}">${esc(t.Status)}</span></div>`;
      row.addEventListener('click', () => openTaskModal(t));
      listEl.appendChild(row);
    });
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.querySelector('.modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', onModalKeydown);
  document.body.appendChild(overlay);
}

/* ---------- Data load ---------- */
function loadData(manual) {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.innerHTML = '<i class="ti ti-refresh"></i> Refreshing...';
  if (!document.querySelector('.hdr')) {
    document.getElementById('root').innerHTML = '<div class="loading">Loading Bando Bodega dashboard...</div>';
  }

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: results => { RAW_TASKS = prepareTasks(results.data); renderAll(); },
    error: () => { RAW_TASKS = prepareTasks(FALLBACK); renderAll(); }
  });
}
